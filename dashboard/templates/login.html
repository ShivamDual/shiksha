<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Login | Shiksha</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', sans-serif;
            background: #0f172a;
            color: #e2e8f0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-box {
            background: #1e293b;
            border: 1px solid #334155;
            border-radius: 20px;
            padding: 48px 40px;
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo {
            font-family: 'Noto Sans Devanagari', sans-serif;
            font-size: 36px;
            font-weight: 600;
            color: #38bdf8;
            margin-bottom: 4px;
        }

        .logo-sub {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 40px;
        }

        h1 {
            font-size: 20px;
            font-weight: 600;
            color: #f1f5f9;
            margin-bottom: 8px;
        }

        .subtitle {
            font-size: 13px;
            color: #64748b;
            margin-bottom: 32px;
        }

        input[type="password"] {
            width: 100%;
            padding: 14px 16px;
            background: #0f172a;
            border: 1px solid #334155;
            border-radius: 10px;
            color: #f1f5f9;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            outline: none;
            transition: border-color 0.2s;
            margin-bottom: 16px;
        }

        input[type="password"]:focus {
            border-color: #38bdf8;
        }

        button {
            width: 100%;
            padding: 14px;
            background: #38bdf8;
            color: #0f172a;
            border: none;
            border-radius: 10px;
            font-size: 15px;
            font-weight: 600;
            font-family: 'Inter', sans-serif;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover { background: #7dd3fc; }

        .error {
            background: #450a0a;
            border: 1px solid #dc2626;
            color: #fca5a5;
            padding: 12px 16px;
            border-radius: 8px;
            font-size: 13px;
            margin-bottom: 16px;
        }

        .back-link {
            display: block;
            margin-top: 24px;
            color: #475569;
            text-decoration: none;
            font-size: 13px;
            transition: color 0.2s;
        }

        .back-link:hover { color: #94a3b8; }
    </style>
</head>
<body>
    <div class="login-box">
        <div class="logo">शिक्षा</div>
        <div class="logo-sub">Shiksha — STEM Glossary</div>

        <h1>Teacher Access</h1>
        <p class="subtitle">Enter your password to view the dashboard</p>

        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}

        <form method="POST">
            <input type="password" name="password" placeholder="Enter password" autofocus>
            <button type="submit">Login →</button>
        </form>

        <a href="/" class="back-link">← Back to Shiksha</a>
    </div>
</body>
</html>
