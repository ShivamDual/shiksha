<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shiksha{% endblock %} | शिक्षा</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Devanagari:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <div class="nav-brand">
            <span class="nepali">शिक्षा</span>
            <span class="english">Shiksha</span>
        </div>
        <div class="nav-subtitle">STEM Glossary for Nepal</div>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <footer>
        <p>Built for students of Nepal 🇳🇵 | Offline-first</p>
    </footer>

    <script src="{{ url_for('static', filename='search.js') }}"></script>
</body>
</html>
